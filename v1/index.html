<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Deja de perder tiempo editando</title>
  <style>
    body { margin: 0; padding: 0; }
    iframe { border: none; width: 100%; height: 100vh; display: block; }
  </style>
</head>
<body>
  <iframe id="ghl" src="about:blank" title="Landing v1"></iframe>
  <script>
    (function() {
      var base = 'https://academia.camelionmedia.com/v1';
      var params = new URLSearchParams(window.location.search);
      // Add landing_variant from cookie
      var cookie = document.cookie.split(';').map(c=>c.trim()).find(c=>c.startsWith('camelion_variant='));
      if (cookie) params.set('landing_variant', cookie.split('=')[1]);
      var qs = params.toString();
      document.getElementById('ghl').src = base + (qs ? '?' + qs : '');
    })();
  </script>
</body>
</html>
