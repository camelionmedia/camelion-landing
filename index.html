<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Camelion Media Landing</title>
  <script>
    (function() {
      const COOKIE_NAME = 'camelion_variant';
      const COOKIE_DURATION = 365;

      function getCookie(name) {
        const nameEQ = name + '=';
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
          let c = cookies[i].trim();
          if (c.indexOf(nameEQ) === 0) return c.substring(nameEQ.length);
        }
        return null;
      }

      function setCookie(name, value, days) {
        const date = new Date();
        date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
        const expires = 'expires=' + date.toUTCString();
        document.cookie = name + '=' + value + ';' + expires + ';path=/';
      }

      function getVariant() {
        let variant = getCookie(COOKIE_NAME);
        if (!variant) {
          variant = Math.random() < 0.5 ? 'v1' : 'v2';
          setCookie(COOKIE_NAME, variant, COOKIE_DURATION);
        }
        return variant;
      }

      const variant = getVariant();
      window.location.href = '/' + variant + '/';
    })();
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
